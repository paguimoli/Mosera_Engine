receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 256
    spike_limit_mib: 64
  attributes/redact:
    actions:
      - key: authorization
        action: delete
      - key: cookie
        action: delete
      - key: set-cookie
        action: delete
      - key: password
        action: delete
      - key: token
        action: delete
      - key: secret
        action: delete
      - key: credential
        action: delete
      - key: api_key
        action: delete
      - key: email
        action: delete
      - key: phone
        action: delete
      - key: http.request.header.authorization
        action: delete
      - key: http.request.header.cookie
        action: delete
      - key: http.response.header.set-cookie
        action: delete
  resource:
    attributes:
      - key: deployment.environment
        value: ${env:DEPLOYMENT_ENVIRONMENT}
        action: upsert
      - key: service.version
        value: ${env:RELEASE_VERSION}
        action: upsert
  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  otlphttp/grafana-cloud:
    endpoint: ${env:OTEL_EXPORTER_OTLP_ENDPOINT}
    headers:
      Authorization: ${env:OTEL_EXPORTER_OTLP_HEADERS}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, attributes/redact, resource, batch]
      exporters: [otlphttp/grafana-cloud]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, attributes/redact, resource, batch]
      exporters: [otlphttp/grafana-cloud]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, attributes/redact, resource, batch]
      exporters: [otlphttp/grafana-cloud]
