x-worker-environment: &worker-environment
  NODE_ENV: production
  SUPABASE_URL: ${SUPABASE_URL:-${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:54321}}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-dummy-service-role-key}
  SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-dummy-anon-key}
  RABBITMQ_URL: ${RABBITMQ_URL:-amqp://lottery:lottery_dev_password@rabbitmq:5672}
  RABBITMQ_EXCHANGE_NAME: ${RABBITMQ_EXCHANGE_NAME:-lottery.events}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  WORKER_HEARTBEAT_INTERVAL_MS: ${WORKER_HEARTBEAT_INTERVAL_MS:-30000}
  OUTBOX_DISPATCH_BATCH_SIZE: ${OUTBOX_DISPATCH_BATCH_SIZE:-50}
  OUTBOX_DISPATCH_IDLE_INTERVAL_MS: ${OUTBOX_DISPATCH_IDLE_INTERVAL_MS:-5000}
  OUTBOX_DISPATCH_BACKLOG_INTERVAL_MS: ${OUTBOX_DISPATCH_BACKLOG_INTERVAL_MS:-250}

x-worker-service: &worker-service
  image: lottery-app-runtime
  restart: unless-stopped
  environment: *worker-environment
  depends_on:
    rabbitmq:
      condition: service_healthy
    redis:
      condition: service_healthy

x-dotnet-healthcheck: &dotnet-healthcheck
  test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready >/dev/null || exit 1"]
  interval: 10s
  timeout: 5s
  retries: 12
  start_period: 20s

services:
  app:
    image: lottery-app-runtime
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:54321}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-${SUPABASE_ANON_KEY:-dummy-publishable-key}}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:54321}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-${SUPABASE_ANON_KEY:-dummy-publishable-key}}
      SUPABASE_URL: ${SUPABASE_URL:-${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:54321}}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-dummy-service-role-key}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-dummy-anon-key}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://lottery:lottery_dev_password@rabbitmq:5672}
      RABBITMQ_EXCHANGE_NAME: ${RABBITMQ_EXCHANGE_NAME:-lottery.events}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SECURITY_ENFORCE_PRODUCTION_SECRETS: ${SECURITY_ENFORCE_PRODUCTION_SECRETS:-false}
      SECURITY_AUDIT_LEVEL: ${SECURITY_AUDIT_LEVEL:-critical}
      SETTLEMENT_AUTHORITY: ${SETTLEMENT_AUTHORITY:-MONOLITH}
      LEDGER_AUTHORITY: ${LEDGER_AUTHORITY:-MONOLITH}
      CREDIT_AUTHORITY: ${CREDIT_AUTHORITY:-MONOLITH}
      SETTLEMENT_COMPARISON_MODE: ${SETTLEMENT_COMPARISON_MODE:-ENABLED}
      LEDGER_COMPARISON_MODE: ${LEDGER_COMPARISON_MODE:-ENABLED}
      CREDIT_COMPARISON_MODE: ${CREDIT_COMPARISON_MODE:-ENABLED}
      SETTLEMENT_AUTHORITY_DRY_RUN_MODE: ${SETTLEMENT_AUTHORITY_DRY_RUN_MODE:-DISABLED}
      SETTLEMENT_MISMATCH_ALERT_THRESHOLD: ${SETTLEMENT_MISMATCH_ALERT_THRESHOLD:-0.001}
      LEDGER_MISMATCH_ALERT_THRESHOLD: ${LEDGER_MISMATCH_ALERT_THRESHOLD:-0.001}
      CREDIT_MISMATCH_ALERT_THRESHOLD: ${CREDIT_MISMATCH_ALERT_THRESHOLD:-0.001}
      SETTLEMENT_ROLLBACK_FAILURE_THRESHOLD: ${SETTLEMENT_ROLLBACK_FAILURE_THRESHOLD:-0.001}
      SETTLEMENT_SHADOW_MODE_ENABLED: ${SETTLEMENT_SHADOW_MODE_ENABLED:-false}
      SETTLEMENT_SERVICE_URL: ${SETTLEMENT_SERVICE_URL:-http://settlement-service:8080}
      LEDGER_SHADOW_MODE_ENABLED: ${LEDGER_SHADOW_MODE_ENABLED:-false}
      LEDGER_SERVICE_URL: ${LEDGER_SERVICE_URL:-http://ledger-service:8080}
      CREDIT_SHADOW_MODE_ENABLED: ${CREDIT_SHADOW_MODE_ENABLED:-false}
      CREDIT_SERVICE_URL: ${CREDIT_SERVICE_URL:-http://credit-wallet-service:8080}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  outbox-dispatcher:
    <<: *worker-service
    command: ["npm", "run", "worker:outbox-dispatcher"]

  worker-critical-financial:
    <<: *worker-service
    command: ["npm", "run", "worker:critical-financial"]

  worker-ticket-lifecycle:
    <<: *worker-service
    command: ["npm", "run", "worker:ticket-lifecycle"]

  worker-settlement:
    <<: *worker-service
    command: ["npm", "run", "worker:settlement"]

  worker-accounting:
    <<: *worker-service
    command: ["npm", "run", "worker:accounting"]

  worker-commission:
    <<: *worker-service
    command: ["npm", "run", "worker:commission"]

  worker-reconciliation:
    <<: *worker-service
    command: ["npm", "run", "worker:reconciliation"]

  worker-operational-access:
    <<: *worker-service
    command: ["npm", "run", "worker:operational-access"]

  worker-reporting:
    <<: *worker-service
    command: ["npm", "run", "worker:reporting"]

  dotnet-template-service:
    build:
      context: ./services/dotnet-template-service
      dockerfile: Dockerfile
    ports:
      - "5100:8080"
    environment:
      SERVICE_NAME: ${DOTNET_TEMPLATE_SERVICE_NAME:-dotnet-template-service}
      ASPNETCORE_ENVIRONMENT: ${DOTNET_TEMPLATE_SERVICE_ENVIRONMENT:-Production}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://lottery:lottery_dev_password@rabbitmq:5672}
      RABBITMQ_EXCHANGE_NAME: ${RABBITMQ_EXCHANGE_NAME:-lottery.events}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck: *dotnet-healthcheck

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    ports:
      - "5600:8080"
    environment:
      SERVICE_NAME: ${AUTH_SERVICE_NAME:-auth-service}
      ASPNETCORE_ENVIRONMENT: ${AUTH_SERVICE_ENVIRONMENT:-Production}
      SUPABASE_URL: ${SUPABASE_URL:-${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:54321}}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-dummy-service-role-key}
      AUTH_PRODUCTION_AUTHENTICATION_ENABLED: ${AUTH_PRODUCTION_AUTHENTICATION_ENABLED:-false}
    healthcheck: *dotnet-healthcheck

  ledger-service:
    build:
      context: ./services/ledger-service
      dockerfile: Dockerfile
    ports:
      - "5200:8080"
    environment:
      SERVICE_NAME: ${LEDGER_SERVICE_NAME:-ledger-service}
      ASPNETCORE_ENVIRONMENT: ${LEDGER_SERVICE_ENVIRONMENT:-Production}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://lottery:lottery_dev_password@rabbitmq:5672}
      RABBITMQ_EXCHANGE_NAME: ${RABBITMQ_EXCHANGE_NAME:-lottery.events}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SUPABASE_URL: ${SUPABASE_URL:-${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:54321}}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-dummy-service-role-key}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck: *dotnet-healthcheck

  credit-wallet-service:
    build:
      context: ./services/credit-wallet-service
      dockerfile: Dockerfile
    ports:
      - "5300:8080"
    environment:
      SERVICE_NAME: ${CREDIT_WALLET_SERVICE_NAME:-credit-wallet-service}
      ASPNETCORE_ENVIRONMENT: ${CREDIT_WALLET_SERVICE_ENVIRONMENT:-Production}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://lottery:lottery_dev_password@rabbitmq:5672}
      RABBITMQ_EXCHANGE_NAME: ${RABBITMQ_EXCHANGE_NAME:-lottery.events}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SUPABASE_URL: ${SUPABASE_URL:-${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:54321}}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-dummy-service-role-key}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck: *dotnet-healthcheck

  settlement-service:
    build:
      context: ./services/settlement-service
      dockerfile: Dockerfile
    ports:
      - "5400:8080"
    environment:
      SERVICE_NAME: ${SETTLEMENT_SERVICE_NAME:-settlement-service}
      ASPNETCORE_ENVIRONMENT: ${SETTLEMENT_SERVICE_ENVIRONMENT:-Production}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://lottery:lottery_dev_password@rabbitmq:5672}
      RABBITMQ_EXCHANGE_NAME: ${RABBITMQ_EXCHANGE_NAME:-lottery.events}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SUPABASE_URL: ${SUPABASE_URL:-${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:54321}}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-dummy-service-role-key}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck: *dotnet-healthcheck

  game-engine:
    build:
      context: ./services/game-engine
      dockerfile: Dockerfile
    ports:
      - "5500:8080"
    environment:
      SERVICE_NAME: ${GAME_ENGINE_SERVICE_NAME:-game-engine}
      ASPNETCORE_ENVIRONMENT: ${GAME_ENGINE_SERVICE_ENVIRONMENT:-Production}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://lottery:lottery_dev_password@rabbitmq:5672}
      RABBITMQ_EXCHANGE_NAME: ${RABBITMQ_EXCHANGE_NAME:-lottery.events}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      GAME_ENGINE_SCHEMA: ${GAME_ENGINE_SCHEMA:-game_engine}
      DATABASE_URL: ${LOCAL_DATABASE_URL:-postgresql://lottery:lottery_dev_password@local-postgres:5432/lottery_local}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      local-postgres:
        condition: service_healthy
      migration-runner:
        condition: service_completed_successfully
    healthcheck: *dotnet-healthcheck

  migration-runner:
    build:
      context: .
      dockerfile: Dockerfile.devtools
    working_dir: /workspace
    command: ["npm", "run", "migrations:local:run"]
    environment:
      DATABASE_URL: ${LOCAL_DATABASE_URL:-postgresql://lottery:lottery_dev_password@local-postgres:5432/lottery_local}
      ALLOW_DISPOSABLE_DB_MIGRATIONS: ${ALLOW_DISPOSABLE_DB_MIGRATIONS:-true}
    volumes:
      - .:/workspace
      - devtools_node_modules:/workspace/node_modules
    depends_on:
      local-postgres:
        condition: service_healthy
    restart: "no"

  devtools:
    build:
      context: .
      dockerfile: Dockerfile.devtools
    profiles:
      - devtools
    working_dir: /workspace
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:54321}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-${SUPABASE_ANON_KEY:-dummy-publishable-key}}
      SUPABASE_URL: ${SUPABASE_URL:-${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:54321}}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-dummy-service-role-key}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-dummy-anon-key}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8080}
      APP_URL: ${APP_URL:-http://app:3000}
      GAME_ENGINE_URL: ${GAME_ENGINE_URL:-http://game-engine:8080}
      SETTLEMENT_SERVICE_URL: ${SETTLEMENT_SERVICE_URL:-http://settlement-service:8080}
      LEDGER_SERVICE_URL: ${LEDGER_SERVICE_URL:-http://ledger-service:8080}
      CREDIT_SERVICE_URL: ${CREDIT_SERVICE_URL:-http://credit-wallet-service:8080}
      RABBITMQ_MANAGEMENT_URL: ${RABBITMQ_MANAGEMENT_URL:-http://rabbitmq:15672}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      DATABASE_URL: ${LOCAL_DATABASE_URL:-postgresql://lottery:lottery_dev_password@local-postgres:5432/lottery_local}
      ALLOW_DISPOSABLE_DB_MIGRATIONS: ${ALLOW_DISPOSABLE_DB_MIGRATIONS:-true}
    volumes:
      - .:/workspace
      - devtools_node_modules:/workspace/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      local-postgres:
        condition: service_healthy

  local-postgres:
    image: postgres:16-alpine
    ports:
      - "${LOCAL_POSTGRES_PORT:-55432}:5432"
    environment:
      POSTGRES_DB: ${LOCAL_POSTGRES_DB:-lottery_local}
      POSTGRES_USER: ${LOCAL_POSTGRES_USER:-lottery}
      POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD:-lottery_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - local_postgres_disposable_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-lottery}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-lottery_dev_password}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping && rabbitmq-diagnostics -q check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  rabbitmq_data:
  redis_data:
  devtools_node_modules:
  local_postgres_disposable_data:
