x-prod-worker-service: &prod-worker-service
  <<:
    - *prod-node-runtime-hardening
    - *prod-worker-resources
  image: *prod-app-image
  restart: unless-stopped
  networks:
    - production-internal
  volumes:
    - *prod-validator-volume
  environment:
    <<: *prod-service-environment
    WORKER_HEARTBEAT_INTERVAL_MS: ${WORKER_HEARTBEAT_INTERVAL_MS:-30000}
    OUTBOX_DISPATCH_BATCH_SIZE: ${OUTBOX_DISPATCH_BATCH_SIZE:-50}
    OUTBOX_DISPATCH_IDLE_INTERVAL_MS: ${OUTBOX_DISPATCH_IDLE_INTERVAL_MS:-5000}
    OUTBOX_DISPATCH_BACKLOG_INTERVAL_MS: ${OUTBOX_DISPATCH_BACKLOG_INTERVAL_MS:-250}

x-prod-dotnet-healthcheck: &prod-dotnet-healthcheck
  test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready >/dev/null || exit 1"]
  interval: 10s
  timeout: 5s
  retries: 12
  start_period: 30s

x-prod-app-healthcheck: &prod-app-healthcheck
  test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health >/dev/null || exit 1"]
  interval: 10s
  timeout: 5s
  retries: 12
  start_period: 30s

services:
  otel-collector:
    <<: *prod-service-resources
    image: *prod-otel-collector-image
    restart: unless-stopped
    read_only: true
    privileged: false
    user: "10001:10001"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    tmpfs:
      - /tmp:size=64m,mode=1777
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    environment:
      DEPLOYMENT_ENVIRONMENT: production
      RELEASE_VERSION: ${RELEASE_VERSION:-production-required}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-__PRODUCTION_REQUIRED_OTEL_EXPORTER_OTLP_ENDPOINT__}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-__PRODUCTION_REQUIRED_OTEL_EXPORTER_OTLP_HEADERS__}
    volumes:
      - ./deploy/otel/collector.production.yaml:/etc/otelcol-contrib/config.yaml:ro
    expose:
      - "4317"
      - "4318"
    networks:
      - production-internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    read_only: true
    privileged: false
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    cpus: "0.50"
    mem_limit: 256m
    mem_reservation: 128m
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /run:size=16m,mode=755
    environment:
      PRODUCTION_HOSTNAME: ${PRODUCTION_HOSTNAME:-__PRODUCTION_REQUIRED_PRODUCTION_HOSTNAME__}
      CADDY_CLOUDFLARE_MODE: ${CADDY_CLOUDFLARE_MODE:-origin}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - *prod-validator-volume
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    command:
      - sh
      - -c
      - |
        sh /opt/lottery/validate-production-config.sh caddy
        exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    depends_on:
      app:
        condition: service_started
    networks:
      - production-edge
      - production-internal

  app:
    <<:
      - *prod-node-runtime-hardening
      - *prod-app-resources
    image: *prod-app-image
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - *prod-validator-volume
    environment:
      <<: *prod-service-environment
      SERVICE_NAME: app
      OTEL_SERVICE_NAME: app
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-__PRODUCTION_REQUIRED_NEXT_PUBLIC_SUPABASE_URL__}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-__PRODUCTION_REQUIRED_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY__}
    command:
      - sh
      - -c
      - |
        sh /opt/lottery/validate-production-config.sh app
        exec npm run start
    depends_on:
      auth-service:
        condition: service_started
      otel-collector:
        condition: service_started
    healthcheck: *prod-app-healthcheck
    networks:
      - production-internal

  auth-service:
    <<:
      - *prod-dotnet-runtime-hardening
      - *prod-service-resources
    image: *prod-auth-image
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - *prod-validator-volume
    environment:
      <<: *prod-dotnet-environment
      SERVICE_NAME: auth-service
      OTEL_SERVICE_NAME: auth-service
      AUTH_PRODUCTION_AUTHENTICATION_ENABLED: "true"
    entrypoint:
      - /bin/sh
      - -c
      - |
        sh /opt/lottery/validate-production-config.sh auth-service
        exec dotnet AuthService.Api.dll
    healthcheck: *prod-dotnet-healthcheck
    networks:
      - production-internal

  game-engine:
    <<:
      - *prod-dotnet-runtime-hardening
      - *prod-service-resources
    image: *prod-game-engine-image
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - *prod-validator-volume
    environment:
      <<: *prod-dotnet-environment
      SERVICE_NAME: game-engine
      OTEL_SERVICE_NAME: game-engine
      GAME_ENGINE_SCHEMA: ${GAME_ENGINE_SCHEMA:-game_engine}
    entrypoint:
      - /bin/sh
      - -c
      - |
        sh /opt/lottery/validate-production-config.sh game-engine
        exec dotnet GameEngine.Api.dll
    healthcheck: *prod-dotnet-healthcheck
    networks:
      - production-internal

  ledger-service:
    <<:
      - *prod-dotnet-runtime-hardening
      - *prod-service-resources
    image: *prod-ledger-image
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - *prod-validator-volume
    environment:
      <<: *prod-dotnet-environment
