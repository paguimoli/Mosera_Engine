      OTEL_SERVICE_NAME: ledger-service
    entrypoint:
      - /bin/sh
      - -c
      - |
        sh /opt/lottery/validate-production-config.sh ledger-service
        exec dotnet LedgerService.dll
    healthcheck: *prod-dotnet-healthcheck
    networks:
      - production-internal

  credit-wallet-service:
    <<:
      - *prod-dotnet-runtime-hardening
      - *prod-service-resources
    image: *prod-credit-image
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - *prod-validator-volume
    environment:
      <<: *prod-dotnet-environment
      SERVICE_NAME: credit-wallet-service
      OTEL_SERVICE_NAME: credit-wallet-service
      LEDGER_SERVICE_URL: http://ledger-service:8080
      CREDIT_SERVICE_URL: http://credit-wallet-service:8080
    entrypoint:
      - /bin/sh
      - -c
      - |
        sh /opt/lottery/validate-production-config.sh credit-wallet-service
        exec dotnet CreditWalletService.dll
    healthcheck: *prod-dotnet-healthcheck
    networks:
      - production-internal

  settlement-service:
    <<:
      - *prod-dotnet-runtime-hardening
      - *prod-service-resources
    image: *prod-settlement-image
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - *prod-validator-volume
    environment:
      <<: *prod-dotnet-environment
