    <<: *prod-worker-service
    environment:
      <<: *prod-service-environment
      SERVICE_NAME: worker-reconciliation
      OTEL_SERVICE_NAME: worker-reconciliation
      WORKER_HEARTBEAT_INTERVAL_MS: ${WORKER_HEARTBEAT_INTERVAL_MS:-30000}
      OUTBOX_DISPATCH_BATCH_SIZE: ${OUTBOX_DISPATCH_BATCH_SIZE:-50}
      OUTBOX_DISPATCH_IDLE_INTERVAL_MS: ${OUTBOX_DISPATCH_IDLE_INTERVAL_MS:-5000}
      OUTBOX_DISPATCH_BACKLOG_INTERVAL_MS: ${OUTBOX_DISPATCH_BACKLOG_INTERVAL_MS:-250}
    command:
      - sh
      - -c
      - |
        sh /opt/lottery/validate-production-config.sh worker
        exec npm run worker:reconciliation

  worker-operational-access:
    <<: *prod-worker-service
    environment:
      <<: *prod-service-environment
      SERVICE_NAME: worker-operational-access
      OTEL_SERVICE_NAME: worker-operational-access
      WORKER_HEARTBEAT_INTERVAL_MS: ${WORKER_HEARTBEAT_INTERVAL_MS:-30000}
      OUTBOX_DISPATCH_BATCH_SIZE: ${OUTBOX_DISPATCH_BATCH_SIZE:-50}
      OUTBOX_DISPATCH_IDLE_INTERVAL_MS: ${OUTBOX_DISPATCH_IDLE_INTERVAL_MS:-5000}
      OUTBOX_DISPATCH_BACKLOG_INTERVAL_MS: ${OUTBOX_DISPATCH_BACKLOG_INTERVAL_MS:-250}
    command:
      - sh
      - -c
      - |
        sh /opt/lottery/validate-production-config.sh worker
        exec npm run worker:operational-access

  worker-reporting:
    <<: *prod-worker-service
    environment:
      <<: *prod-service-environment
      SERVICE_NAME: worker-reporting
      OTEL_SERVICE_NAME: worker-reporting
      WORKER_HEARTBEAT_INTERVAL_MS: ${WORKER_HEARTBEAT_INTERVAL_MS:-30000}
      OUTBOX_DISPATCH_BATCH_SIZE: ${OUTBOX_DISPATCH_BATCH_SIZE:-50}
      OUTBOX_DISPATCH_IDLE_INTERVAL_MS: ${OUTBOX_DISPATCH_IDLE_INTERVAL_MS:-5000}
      OUTBOX_DISPATCH_BACKLOG_INTERVAL_MS: ${OUTBOX_DISPATCH_BACKLOG_INTERVAL_MS:-250}
    command:
      - sh
      - -c
      - |
        sh /opt/lottery/validate-production-config.sh worker
        exec npm run worker:reporting

  migration-runner:
    <<:
      - *prod-node-runtime-hardening
      - *prod-worker-resources
    image: *prod-app-image
    profiles:
      - manual
    restart: "no"
    environment:
      <<: *prod-service-environment
      SERVICE_NAME: migration-runner
      OTEL_SERVICE_NAME: migration-runner
      ALLOW_DISPOSABLE_DB_MIGRATIONS: "false"
    volumes:
      - *prod-validator-volume
    command:
      - sh
      - -c
      - |
        sh /opt/lottery/validate-production-config.sh migration-runner
        exec npm run migrations:production:dry-run
    networks:
      - production-internal

networks:
  production-edge:
    name: lottery-production-edge
  production-internal:
    name: lottery-production-internal
    internal: true

volumes:
