name: lottery-app-production

x-prod-app-image: &prod-app-image ${PRODUCTION_APP_IMAGE:-ghcr.io/lottery-app/lottery-app:${RELEASE_VERSION:-production-required}}
x-prod-auth-image: &prod-auth-image ${PRODUCTION_AUTH_SERVICE_IMAGE:-ghcr.io/lottery-app/auth-service:${RELEASE_VERSION:-production-required}}
x-prod-game-engine-image: &prod-game-engine-image ${PRODUCTION_GAME_ENGINE_IMAGE:-ghcr.io/lottery-app/game-engine:${RELEASE_VERSION:-production-required}}
x-prod-ledger-image: &prod-ledger-image ${PRODUCTION_LEDGER_SERVICE_IMAGE:-ghcr.io/lottery-app/ledger-service:${RELEASE_VERSION:-production-required}}
x-prod-credit-image: &prod-credit-image ${PRODUCTION_CREDIT_WALLET_SERVICE_IMAGE:-ghcr.io/lottery-app/credit-wallet-service:${RELEASE_VERSION:-production-required}}
x-prod-settlement-image: &prod-settlement-image ${PRODUCTION_SETTLEMENT_SERVICE_IMAGE:-ghcr.io/lottery-app/settlement-service:${RELEASE_VERSION:-production-required}}
x-prod-otel-collector-image: &prod-otel-collector-image ${PRODUCTION_OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib:0.115.1}
x-prod-validator-volume: &prod-validator-volume ./deploy/production/validate-production-config.sh:/opt/lottery/validate-production-config.sh:ro

x-prod-hardened-base: &prod-hardened-base
  read_only: true
  privileged: false
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  pids_limit: 256

x-prod-node-runtime-hardening: &prod-node-runtime-hardening
  <<: *prod-hardened-base
  user: "1000:1000"
  tmpfs:
    - /tmp:size=64m,mode=1777
    - /app/.qa:size=32m,mode=1777
    - /app/.next/cache:size=64m,mode=1777

x-prod-dotnet-runtime-hardening: &prod-dotnet-runtime-hardening
  <<: *prod-hardened-base
  user: "1654:1654"
  tmpfs:
    - /tmp:size=64m,mode=1777

x-prod-app-resources: &prod-app-resources
  cpus: "1.00"
  mem_limit: 1024m
  mem_reservation: 512m

x-prod-service-resources: &prod-service-resources
  cpus: "0.75"
  mem_limit: 768m
  mem_reservation: 384m

x-prod-worker-resources: &prod-worker-resources
  cpus: "0.50"
  mem_limit: 512m
  mem_reservation: 256m

x-prod-service-environment: &prod-service-environment
  NODE_ENV: production
  HOME: /tmp
  DEPLOYMENT_ENVIRONMENT: production
  RELEASE_VERSION: ${RELEASE_VERSION:-production-required}
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_TRACES_EXPORTER: otlp
  OTEL_METRICS_EXPORTER: otlp
  OTEL_LOGS_EXPORTER: otlp
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=production,service.version=${RELEASE_VERSION:-production-required}
  DATABASE_URL: ${DATABASE_URL:-__PRODUCTION_REQUIRED_DATABASE_URL__}
  MIGRATIONS_DATABASE_URL: ${MIGRATIONS_DATABASE_URL:-__PRODUCTION_REQUIRED_MIGRATIONS_DATABASE_URL__}
  DATABASE_SSL_MODE: ${DATABASE_SSL_MODE:-require}
  REDIS_URL: ${REDIS_URL:-__PRODUCTION_REQUIRED_REDIS_URL__}
  REDIS_TLS: ${REDIS_TLS:-true}
  RABBITMQ_URL: ${RABBITMQ_URL:-__PRODUCTION_REQUIRED_RABBITMQ_URL__}
  RABBITMQ_MANAGEMENT_URL: ${RABBITMQ_MANAGEMENT_URL:-}
  RABBITMQ_MANAGEMENT_TOKEN_REF: ${RABBITMQ_MANAGEMENT_TOKEN_REF:-}
  RABBITMQ_EXCHANGE_NAME: ${RABBITMQ_EXCHANGE_NAME:-lottery.events}
  MANAGED_POSTGRES_REQUIRED: "true"
  MANAGED_REDIS_REQUIRED: "true"
  MANAGED_RABBITMQ_REQUIRED: "true"
  MANAGED_DEPENDENCY_READINESS_REQUIRED: "true"
  PRODUCTION_MIGRATION_BACKUP_CHECKPOINT: ${PRODUCTION_MIGRATION_BACKUP_CHECKPOINT:-__PRODUCTION_REQUIRED_PRODUCTION_MIGRATION_BACKUP_CHECKPOINT__}
  PRODUCTION_MIGRATION_STAGING_REHEARSAL_EVIDENCE: ${PRODUCTION_MIGRATION_STAGING_REHEARSAL_EVIDENCE:-__PRODUCTION_REQUIRED_PRODUCTION_MIGRATION_STAGING_REHEARSAL_EVIDENCE__}
  PRODUCTION_MIGRATION_APPROVAL_TOKEN: ${PRODUCTION_MIGRATION_APPROVAL_TOKEN:-__PRODUCTION_REQUIRED_PRODUCTION_MIGRATION_APPROVAL_TOKEN__}
  PRODUCTION_MIGRATION_APPROVED: ${PRODUCTION_MIGRATION_APPROVED:-false}
  PRODUCTION_MIGRATION_DRIFT_CHECK: ${PRODUCTION_MIGRATION_DRIFT_CHECK:-required}
  PRODUCTION_MIGRATION_DRIFT_RESULT: ${PRODUCTION_MIGRATION_DRIFT_RESULT:-required}
  SUPABASE_URL: ${SUPABASE_URL:-__PRODUCTION_REQUIRED_SUPABASE_URL__}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-__PRODUCTION_REQUIRED_SUPABASE_SERVICE_ROLE_KEY__}
  SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-__PRODUCTION_REQUIRED_SUPABASE_ANON_KEY__}
  APP_BASE_URL: ${APP_BASE_URL:-__PRODUCTION_REQUIRED_APP_BASE_URL__}
  PUBLIC_APP_URL: ${PUBLIC_APP_URL:-__PRODUCTION_REQUIRED_PUBLIC_APP_URL__}
  PRODUCTION_HOSTNAME: ${PRODUCTION_HOSTNAME:-__PRODUCTION_REQUIRED_PRODUCTION_HOSTNAME__}
  SECURITY_ENFORCE_PRODUCTION_SECRETS: "true"
  SECURITY_AUDIT_LEVEL: ${SECURITY_AUDIT_LEVEL:-high}
  AUTH_PROVIDER: auth-service
  AUTH_AUTHORITY: ${AUTH_AUTHORITY:-MONOLITH}
  AUTH_ALLOW_INITIAL_BOOTSTRAP: "false"
  AUTH_SERVICE_URL: http://auth-service:8080
  AUTH_SIGNING_KEY_REF: ${AUTH_SIGNING_KEY_REF:-__PRODUCTION_REQUIRED_AUTH_SIGNING_KEY_REF__}
  AUTH_REFRESH_TOKEN_SECRET_REF: ${AUTH_REFRESH_TOKEN_SECRET_REF:-__PRODUCTION_REQUIRED_AUTH_REFRESH_TOKEN_SECRET_REF__}
  AUTH_SESSION_SECRET_REF: ${AUTH_SESSION_SECRET_REF:-__PRODUCTION_REQUIRED_AUTH_SESSION_SECRET_REF__}
  AUTH_SERVICE_TOKEN_SIGNING_KEY_REF: ${AUTH_SERVICE_TOKEN_SIGNING_KEY_REF:-__PRODUCTION_REQUIRED_AUTH_SERVICE_TOKEN_SIGNING_KEY_REF__}
  SETTLEMENT_AUTHORITY: ${SETTLEMENT_AUTHORITY:-MONOLITH}
  LEDGER_AUTHORITY: ${LEDGER_AUTHORITY:-MONOLITH}
  CREDIT_AUTHORITY: ${CREDIT_AUTHORITY:-MONOLITH}
  ALLOW_MONOLITH_AUTHORITY_IN_PRODUCTION: ${ALLOW_MONOLITH_AUTHORITY_IN_PRODUCTION:-false}
  SETTLEMENT_COMPARISON_MODE: ${SETTLEMENT_COMPARISON_MODE:-ENABLED}
  LEDGER_COMPARISON_MODE: ${LEDGER_COMPARISON_MODE:-ENABLED}
  CREDIT_COMPARISON_MODE: ${CREDIT_COMPARISON_MODE:-ENABLED}
  SETTLEMENT_AUTHORITY_DRY_RUN_MODE: ${SETTLEMENT_AUTHORITY_DRY_RUN_MODE:-DISABLED}
  SETTLEMENT_SERVICE_URL: http://settlement-service:8080
  LEDGER_SERVICE_URL: http://ledger-service:8080
  CREDIT_SERVICE_URL: http://credit-wallet-service:8080

