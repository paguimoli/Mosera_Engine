name: Publish Production Images to GHCR

on:
  push:
    branches:
      - main
    tags:
      - "p*"
      - "v*"
      - "phase-*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ matrix.image }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: lottery-app
            context: .
            dockerfile: ./Dockerfile

          - image: auth-service
            context: ./services/auth-service
            dockerfile: ./services/auth-service/Dockerfile

          - image: game-engine
            context: ./services/game-engine
            dockerfile: ./services/game-engine/Dockerfile

          - image: ledger-service
            context: ./services/ledger-service
            dockerfile: ./services/ledger-service/Dockerfile

          - image: credit-wallet-service
            context: ./services/credit-wallet-service
            dockerfile: ./services/credit-wallet-service/Dockerfile

          - image: settlement-service
            context: ./services/settlement-service
            dockerfile: ./services/settlement-service/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=production,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=long
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=Mosera production container image
            org.opencontainers.image.vendor=Mosera
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: true
          sbom: true
